name: Release
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Version to build (e.g. 0.1.0), for dry runs
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    # secrets can't be used in `if:` directly — surface presence as an env flag (VT is optional).
    env:
      HAS_VT_KEY: ${{ secrets.VT_API_KEY != '' }}
    steps:
      - name: Checkout (full history for Velopack deltas)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version
        id: ver
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF -replace '^refs/tags/v','' }
               else { '${{ github.event.inputs.version }}' }
          "value=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Install vpk
        shell: pwsh
        run: |
          # Pin vpk to the Velopack library version the app references (1.2.0).
          dotnet tool install -g vpk --version 1.2.0
          # Ensure the global-tools dir is on PATH for the pack + upload steps below.
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Publish, smoke, pack
        shell: pwsh
        run: ./scripts/pack.ps1 -Version ${{ steps.ver.outputs.value }}

      - name: Upload to GitHub Release
        run: >
          vpk upload github
          --repoUrl https://github.com/Borcioo/dayz-labs
          --token ${{ secrets.GITHUB_TOKEN }}
          --publish
          --releaseName "dzl ${{ steps.ver.outputs.value }}"
          --tag v${{ steps.ver.outputs.value }}
          -o artifacts/release

      # Optional: scan the unsigned Setup.exe on VirusTotal so users can verify it's clean.
      # Enabled by the VT_API_KEY repo secret (free key). The action is a Node action, so it runs
      # on this windows-latest job; it handles the >32 MB upload flow for the ~80 MB installer.
      - name: VirusTotal scan
        id: vt
        if: env.HAS_VT_KEY == 'true'
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: artifacts/release/DayZLabs-win-Setup.exe

      # The action's update_release_body only fires on `release` events; we trigger on tag push,
      # so append the VirusTotal link to the release notes ourselves.
      - name: Append VirusTotal link to the release notes
        if: env.HAS_VT_KEY == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANALYSIS: ${{ steps.vt.outputs.analysis }}
        run: |
          tag="v${{ steps.ver.outputs.value }}"
          url="${ANALYSIS#*=}"
          {
            gh release view "$tag" -R "$GITHUB_REPOSITORY" --json body --jq .body
            printf '\n**VirusTotal scan:** %s\n' "$url"
          } | gh release edit "$tag" -R "$GITHUB_REPOSITORY" --notes-file -
