name: Feature request
description: Suggest an idea or improvement for dzl
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do today, and where does dzl get in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like dzl to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried or thought about.
  - type: dropdown
    id: frontend
    attributes:
      label: Which frontend(s) does this touch?
      multiple: true
      options:
        - Tray app
        - CLI
        - MCP server
        - Core / all of them
